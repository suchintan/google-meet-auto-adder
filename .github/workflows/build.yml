name: Build Extension

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build zip
        run: zip -r google-meet-auto-adder.zip manifest.json content.js popup.html popup.js icons/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: google-meet-auto-adder
          path: google-meet-auto-adder.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build zip
        run: zip -r google-meet-auto-adder.zip manifest.json content.js popup.html popup.js icons/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: google-meet-auto-adder.zip
          generate_release_notes: true
